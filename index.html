    <script>
        var ImgSld = ["IMG/megapapash.png", "IMG/chopsueyh.png", "IMG/polloh.png", "IMG/cantonesh.png", "IMG/pataconesh.png"];
        var pos = 0;
        function siguiente(){
            pos = pos + 1;
            if(pos >= ImgSld.length){
                pos = 0;
            }
            document.getElementById("ImgSld1").src = ImgSld[pos];
        }

        function anterior(){
            pos = pos - 1;
            if(pos < 0){
                pos = ImgSld.length - 1;
            }
            document.getElementById("ImgSld1").src = ImgSld[pos];
        }
        setInterval(siguiente, 3000);
    </script>
